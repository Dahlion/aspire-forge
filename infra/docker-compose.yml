services:

  postgres:
    image: postgres:16
    container_name: SeacoastDevOpsDbServer
    environment:
      POSTGRES_DB: dbSeacoastDevops
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d dbSeacoastDevops"]
      interval: 5s
      timeout: 5s
      retries: 20

  pgadmin:
    image: dpage/pgadmin4
    container_name: SeacoastDevOps-pgAdmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@seacoastdevops.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  redis:
    image: redis:7
    container_name: SeacoastDevOps-Redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: SeacoastDevOps-Keycloak
    command: ["start-dev", "--import-realm"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ../docker/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
      - ../docker/keycloak/Themes:/opt/keycloak/themes:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health/ready || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
    depends_on:
      postgres:
        condition: service_healthy

  mailpit:
    image: axllent/mailpit
    container_name: SeacoastDevOps-Mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    container_name: SeacoastDevOps-Azurite
    ports:
      - "10000:10000"
      - "10001:10001"
      - "10002:10002"
    volumes:
      - azuritedata:/data

volumes:
  pgdata:
  azuritedata:
