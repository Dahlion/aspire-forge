<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AspireForge Admin</title>

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />

    <!--
      DataTables 2.1.8 + Bootstrap 4 integration CSS
      Bundle includes: Buttons (copy/csv/excel/pdf/print/colvis), ColReorder,
      FixedColumns, FixedHeader, Responsive, RowGroup, RowReorder,
      SearchBuilder, SearchPanes, Select
    -->
    <link
      rel="stylesheet"
      href="https://cdn.datatables.net/v/bs4/jszip-3.10.1/dt-2.1.8/b-3.2.2/b-colvis-3.2.2/b-html5-3.2.2/b-print-3.2.2/cr-2.0.5/fc-5.0.4/fh-4.0.1/r-3.0.4/rg-1.5.1/rr-1.5.0/sb-1.8.2/sp-2.3.3/sl-2.1.0/datatables.min.css"
    />
  </head>
  <body>
    <div id="root"></div>

    <!-- JSZip must load before DataTables Buttons HTML5 export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <!-- pdfmake must load before DataTables Buttons PDF export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.7/vfs_fonts.js"></script>
    <!-- jQuery 3.7.1 (required by DataTables) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Bootstrap 4 bundle (Popper + JS — enables dropdowns, tooltips, etc.) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <!-- DataTables 2.1.8 + all extensions (same bundle token as CSS above) -->
    <script src="https://cdn.datatables.net/v/bs4/jszip-3.10.1/dt-2.1.8/b-3.2.2/b-colvis-3.2.2/b-html5-3.2.2/b-print-3.2.2/cr-2.0.5/fc-5.0.4/fh-4.0.1/r-3.0.4/rg-1.5.1/rr-1.5.0/sb-1.8.2/sp-2.3.3/sl-2.1.0/datatables.min.js"></script>

    <!-- React app (ESM module — deferred, runs after CDN scripts above) -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
